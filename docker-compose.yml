services:
  apibibliotecahistorico:
      image: bitnami/laravel:latest
      container_name: apibibliotecahistorico
      restart: unless-stopped
      ports:
        - "8778:8778"
      networks:
        - kong-net
      volumes:
        - ./backend/ApiBibliotecaArchHist:/app
        - ./backend/php.ini:/usr/local/etc/php/php.ini
      #  - ./ssl/openssl.cnf:/etc/ssl/openssl.cnf
      #depends_on:
        #- db
      working_dir: /app
      command: >
        bash -c "composer install
        && php artisan serve --host=0.0.0.0 --port=8778"

networks:
  kong-net:
    external: true
